apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequireseccomp
spec:
  crd:
    spec:
      names:
        kind: K8sRequireSeccomp
      validation:
        openAPIV3Schema:
          type: object
          properties:
            allowedProfiles:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequireseccomp

        violation[{"msg": msg}] {
          not input.review.object.spec.securityContext.seccompProfile
          msg := "pod has no seccomp profile -- set spec.securityContext.seccompProfile.type to RuntimeDefault or Localhost"
        }

        violation[{"msg": msg}] {
          profile := input.review.object.spec.securityContext.seccompProfile.type
          allowed := input.parameters.allowedProfiles
          not profile_allowed(profile, allowed)
          msg := sprintf("seccomp profile <%v> is not in the allowed list %v", [profile, allowed])
        }

        profile_allowed(profile, allowed) {
          allowed[_] == profile
        }
