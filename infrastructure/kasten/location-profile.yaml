apiVersion: config.kio.kasten.io/v1alpha1
kind: Profile
metadata:
  name: azure-blob-export
  namespace: kasten-io
spec:
  type: Location
  locationSpec:
    credential:
      secretType: AzureManagedIdentity
    type: ObjectStore
    objectStore:
      objectStoreType: AZ
      # Replace with output from: terraform output kasten_storage_account
      name: STORAGE_ACCOUNT_NAME
      path: k10-backups
      pathType: Container
